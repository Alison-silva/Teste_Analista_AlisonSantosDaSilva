<div class="container mx-auto p-6 bg-gray-50 min-h-screen">
  
    <div class="mb-8">
      <h1 class="text-3xl font-bold">Gestor de Vendas</h1>
    </div>

    <div class="mb-6 flex flex-col md:flex-row gap-4 bg-white p-4 rounded-xl shadow-sm border border-gray-100">
      
        <div class="flex-1">
          <label class="block text-sm font-medium text-gray-700 mb-1">Buscar Cliente</label>
          <input type="text" [(ngModel)]="filtroNome" (input)="filtro()" placeholder="Digite o nome..."
            class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:outline-none"/>
        </div>

        <div class="w-full md:w-64">
          <label class="block text-sm font-medium text-gray-700 mb-1">Status do Pedido</label>
          <select [(ngModel)]="filtroStatus" (change)="filtro()"
            class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:outline-none">
            <option value="">Todos os Status</option>
            <option value="Concluído">Concluído</option>
            <option value="Cancelado">Cancelado</option>
            <option value="Pendente">Pendente</option>
          </select>
        </div>
      </div>

    <div class="overflow-hidden">
      <table class="w-full border-collapse bg-white text-left text-sm text-gray-500">
          <thead class="bg-gray-100">
              <tr>
                  <th class="px-6 py-4 font-bold text-gray-900">Cliente</th>
                  <th class="px-6 py-4 font-bold text-gray-900">Valor</th>
                  <th class="px-6 py-4 font-bold text-gray-900 text-center">Status</th>
                  <th class="px-6 py-4 font-bold text-gray-900 text-center">Detalhes</th>
              </tr>
          </thead>
          <tbody class="divide-y divide-gray-100 border-t border-gray-100">
            <tr *ngFor="let venda of vendasFiltro" class="transition-colors">
              
              <td class="px-6 py-4 font-medium text-gray-900">{{ venda.cliente }}</td>
              <td class="px-6 py-4 font-semibold text-gray-700">{{ venda.valor | currency:'BRL' }}</td>
              <td class="px-6 py-4 text-center"> {{ venda.status }}</td>
              <td class="px-6 py-4 text-center">
                <button 
                  class="bg-transparent hover:bg-blue-500 text-blue-700 font-semibold hover:text-white py-2 px-4 border border-blue-500 hover:border-transparent rounded rounded-full">
                  Detalhes
                </button>
              </td>
            </tr>
          </tbody>
      </table>
  </div>
</div>

<div class="container mt-5">
  <h2 class="mb-4">Lista de Vendas</h2>

  <table class="table table-striped table-hover border">
    <thead class="table-dark">
      <tr>
        <th>Cliente</th>
        <th>Valor</th>
        <th>Status</th>
      </tr>
    </thead>
    <tbody>
      <tr *ngFor="let venda of jsonVendas">
        <td>{{ venda.cliente }}</td>
        <td>{{ venda.valor | currency:'BRL' }}</td>
        <td>
          <span [ngClass]="{
            'badge bg-success': venda.status === 'Concluído',
            'badge bg-danger': venda.status === 'Cancelado',
            'badge bg-warning text-dark': venda.status === 'Pendente'
          }">
            {{ venda.status }}
          </span>
        </td>
      </tr>
    </tbody>
  </table>

  <div *ngIf="jsonVendas.length === 0" class="alert alert-info">
    Carregando vendas ou nenhum registro encontrado...
  </div>
</div>
